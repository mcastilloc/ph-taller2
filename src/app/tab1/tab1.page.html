<ion-header>
  <ion-toolbar>
    <ion-title>
      Cita aleatoria
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngIf="cita">

    <ion-card-header>
      <ion-card-title>
        "{{ cita.frase }}"
      </ion-card-title>
    </ion-card-header>

    <ion-card-content>
      — {{ cita.autor }}
    </ion-card-content>

  </ion-card>

</ion-content>
