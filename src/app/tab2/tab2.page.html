<ion-header>
  <ion-toolbar>
    <ion-title>
      Gestión de citas
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <app-cita-card
    *ngFor="let cita of citas"
    [cita]="cita"
    [permitirEliminar]="true"
    (eliminar)="eliminar($event)">
  </app-cita-card>

</ion-content>
